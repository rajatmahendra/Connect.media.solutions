<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Media Solutions | Next-Gen LED Video Walls</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --primary-bg: #090d16; --card-bg: #141c2b; --accent-cyan: #00f5d4; 
            --accent-pink: #ff007f; --accent-purple: #9b5de5; --text-pure: #ffffff; 
            --text-muted: #94a3b8; --neon-glow: 0 0 15px rgba(0, 245, 212, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--primary-bg); color: var(--text-pure); line-height: 1.6; overflow-x: hidden; }
        
        /* Layout */
        header { position: fixed; top: 0; width: 100%; background: rgba(9, 13, 22, 0.95); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 2px solid var(--card-bg); padding: 1.2rem 2rem; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--accent-cyan); }
        nav ul { display: flex; list-style: none; gap: 1.5rem; }
        nav a { color: var(--text-pure); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; }
        
        section { padding: 6rem 2rem; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; color: var(--accent-pink); font-size: 2.5rem; text-transform: uppercase; margin-bottom: 3rem; }
        .row-banner { width: 100%; max-height: 450px; object-fit: cover; border-radius: 12px; margin-top: 2rem; }
        
        /* Map Specific */
        #live-map-canvas { height: 500px; width: 100%; background: #0d121f; border-radius: 12px; border: 1px solid #333; }
        .btn-tour { background: linear-gradient(135deg, var(--accent-cyan), #00b4d8); color: #000; padding: 15px 30px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* Grid Layouts */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2.5rem; }
        .split-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2.5rem; }
        .card { background-color: var(--card-bg); padding: 2rem; border-radius: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">Connect Media Solutions</div>
            <nav><ul><li><a href="#home">Home</a></li><li><a href="#infrastructure">Infrastructure</a></li><li><a href="#installation-map-section">Map</a></li><li><a href="#media-hub">Showcase</a></li></ul></nav>
        </div>
    </header>

    <section id="home" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center;"><h1>Connect Media Solutions</h1><p>Next-Gen LED Video Walls</p></div>
    </section>

    <!-- 1. Infrastructure -->
    <section id="infrastructure">
        <h2 class="section-title">Our Nationwide Infrastructure</h2>
        <img src="pic4.jpg" alt="India Map" class="row-banner" />
    </section>

    <!-- 2. Map Section -->
    <section id="installation-map-section">
        <h2 class="section-title">Our Varanasi Installation Footprint</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <button id="start-tour-btn" class="btn-tour">🎬 Start Virtual Tour</button>
        </div>
        <div id="live-map-canvas"></div>
    </section>

    <!-- 3. Showcase Section -->
    <section id="media-hub">
        <h2 class="section-title">On-Site Project Deployments</h2>
        <div class="video-grid">
            <!-- Project Cards -->
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        window.onload = function() {
            var map = L.map('live-map-canvas').setView([25.3350, 82.9500], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
            
            setTimeout(() => map.invalidateSize(), 500);

            document.getElementById('start-tour-btn').addEventListener('click', function() {
                // Smooth jump locations
                const stops = [[25.4485, 82.8572], [25.3116, 83.0103]];
                let i = 0;
                function next() {
                    if(i < stops.length) {
                        map.flyTo(stops[i], 16, { duration: 2.2 });
                        i++;
                        setTimeout(next, 3000);
                    }
                }
                next();
            });
        };
    </script>
</body>
</html>
