<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Media Solutions | Installation Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body { background-color: #090d16; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .map-section { padding: 40px 20px; text-align: center; }
        #live-map-canvas { 
            height: 500px !important; 
            width: 100% !important; 
            margin-top: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #0d121f;
        }
        .btn-tour { background: #00f5d4; color: #000; padding: 15px 30px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <section class="map-section">
        <h2 style="color: #ff007f; margin-bottom: 20px;">Varanasi Installation Footprint</h2>
        <button id="start-tour-btn" class="btn-tour">🎬 Start Virtual Tour</button>
        <div id="live-map-canvas"></div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Map initialization with a delay to ensure container is ready
            setTimeout(function() {
                var map = L.map('live-map-canvas').setView([25.3350, 82.9500], 11);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);

                map.invalidateSize();

                // Virtual Tour Logic
                document.getElementById('start-tour-btn').addEventListener('click', function() {
                    map.flyTo([25.3116, 83.0103], 15, { duration: 2 });
                });
            }, 1000);
        });
    </script>
</body>
</html>
