<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Media Solutions | Next-Gen LED Video Walls</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        /* Map container ko ek fixed size aur display property dein */
        #live-map-canvas { 
            height: 500px !important; 
            width: 100% !important; 
            display: block !important; 
            border-radius: 12px; 
            background: #0d121f; 
        }
    </style>
</head>
<body>

    <section id="installation-map-section">
        <h2 class="section-title">Our Varanasi Installation Footprint</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <button id="start-tour-btn" class="btn-tour">🎬 Start Virtual Tour</button>
        </div>
        <div id="live-map-canvas"></div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Page fully load hone ka wait karein
        document.addEventListener("DOMContentLoaded", function() {
            var map = L.map('live-map-canvas').setView([25.3350, 82.9500], 11);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // 1. Force resize check (Isse map tiles fix ho jayengi)
            setTimeout(function() {
                map.invalidateSize();
            }, 500);

            // 2. Tour logic
            document.getElementById('start-tour-btn').addEventListener('click', function() {
                // Tour start hote hi ek baar phir invalidateSize call karein taaki animations smooth rahein
                map.invalidateSize();
                map.flyTo([25.3116, 83.0103], 15, { duration: 2.2 });
            });
        });
    </script>
</body>
</html>
